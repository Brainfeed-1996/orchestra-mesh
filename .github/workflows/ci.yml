name: ci

on:
  push:
  pull_request:

jobs:
  placeholder-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate package manifest
        run: node -e "const fs=require('fs'); const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); if(!pkg.name) process.exit(1); console.log(pkg.name)"
